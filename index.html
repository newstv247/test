<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Loader</title>
</head>
<body>

<script>
const fileMap = {
  "56ktkh2ksks": "/pdfs/1.pdf",
  "z421hk0djng": "/pdfs/2.pdf",
  "a8k29xplm22": "/pdfs/3.pdf"
};

const params = new URLSearchParams(window.location.search);
const code = params.get("io0");

if (code && fileMap[code]) {
  // Direct PDF load
  window.location.href = fileMap[code];
} else {
  document.body.innerHTML = "<h2>Invalid file code.</h2>";
}
</script>

</body>
</html>
